<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzQQqJh_AAHT60V7Vv9WhtVVKbtY_a3Vk",
            authDomain: "dailytasktracker-a5d86.firebaseapp.com",
            projectId: "dailytasktracker-a5d86",
            storageBucket: "dailytasktracker-a5d86.firebasestorage.app",
            messagingSenderId: "903078792164",
            appId: "1:903078792164:web:e12020a890a3f754ba95f1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let tasks = [];
        let currentUser = null;
        let currentOpenTaskId = null;
        let currentEditData = null;

        // Auto cleanup old tasks (older than 7 days)
        async function autoCleanupTasks(allTasks, userUid) {
            const today = new Date();
            const sevenDaysAgo = new Date(today);
            sevenDaysAgo.setDate(today.getDate() - 7);
            const thresholdDate = sevenDaysAgo.toLocaleDateString('en-CA');
            const updatedTasks = allTasks.filter(task => task.date >= thresholdDate);
            if (updatedTasks.length !== allTasks.length) {
                await setDoc(doc(db, "users", userUid), { tasks: updatedTasks });
                return updatedTasks;
            }
            return allTasks;
        }

        function getSmartDate(allTasks) {
            const today = new Date().toLocaleDateString('en-CA');
            const hasTaskToday = allTasks.some(t => t.date === today);
            if (hasTaskToday) return today;
            if (allTasks.length > 0) {
                const uniqueDates = [...new Set(allTasks.map(t => t.date))].sort();
                const pastDates = uniqueDates.filter(d => d < today);
                if (pastDates.length > 0) return pastDates[pastDates.length - 1];
                return uniqueDates[0]; 
            }
            return today;
        }

        function migrateOldCategories(taskArray) {
            return taskArray.map(t => {
                if(t.category === 'Study') t.category = 'প্লানওয়াইজ পড়া';
                if(t.category === 'Other') t.category = 'CT এর পড়া';
                return t;
            });
        }

        window.handleAuth = async () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            if(!email || !pass) return alert("Please fill all fields");

            try {
                await setPersistence(auth, inMemoryPersistence);
                await signInWithEmailAndPassword(auth, email, pass);
                localStorage.setItem('savedEmail', email);
                localStorage.setItem('savedPass', pass);
                document.getElementById('loginOverlay').style.display = 'none';
            } catch (error) {
                alert(error.message);
            }
        };

        window.togglePass = () => {
            const passInput = document.getElementById('passInput');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passInput.type === "password") {
                passInput.type = "text"; toggleIcon.innerText = "👁️‍🗨️";
            } else {
                passInput.type = "password"; toggleIcon.innerText = "👁️";
            }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        async function loadViewOnlyData() {
            const publicDocRef = doc(db, "users", "Sx0d90b41FPeF9l6qa7kJCZirJp2"); 
            onSnapshot(publicDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    let allTasks = docSnap.data().tasks || [];
                    tasks = migrateOldCategories(allTasks);
                    document.getElementById('dateFilter').value = getSmartDate(tasks);
                }
                renderApp();
            });
        }

        onAuthStateChanged(auth, (user) => {
            document.getElementById('app').style.opacity = '1';
            document.getElementById('app').style.transform = 'translateY(0)';
            
            if (user) {
                currentUser = user;
                document.getElementById('loginBtnNav').style.display = 'none';
                document.getElementById('logoutBtnNav').style.display = 'inline-block';
                document.getElementById('deleteDayBtn').style.display = 'inline-block';
                document.body.classList.add('is-logged-in'); 
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
                
                onSnapshot(doc(db, "users", user.uid), async (docSnap) => {
                    if (docSnap.exists()) {
                        let allTasks = docSnap.data().tasks || [];
                        allTasks = migrateOldCategories(allTasks);
                        allTasks = await autoCleanupTasks(allTasks, user.uid);
                        tasks = allTasks;
                        document.getElementById('dateFilter').value = getSmartDate(tasks);
                    } else { tasks = []; }
                    renderApp();
                });
            } else {
                currentUser = null;
                document.body.classList.remove('is-logged-in');
                document.getElementById('loginBtnNav').style.display = 'inline-block';
                document.getElementById('logoutBtnNav').style.display = 'none';
                document.getElementById('deleteDayBtn').style.display = 'none';
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                loadViewOnlyData(); 
            }
        });

        async function saveToFirebase() {
            if (currentUser) {
                await setDoc(doc(db, "users", currentUser.uid), { tasks: tasks });
            } else {
                alert("You are in View Only mode. Please login to save changes.");
            }
        }

        window.addTask = async (cat) => {
            if(!currentUser) return alert("Login to add tasks!");
            
            let inputId = '';
            if(cat === 'প্লানওয়াইজ পড়া') inputId = 'secAIn';
            if(cat === 'CT এর পড়া') inputId = 'secBIn';
            if(cat === 'MT এর পড়া') inputId = 'secCIn';
            if(cat === 'Others Tasks') inputId = 'secDIn';

            const input = document.getElementById(inputId);
            const taskValue = input.value.trim(); 
            if(!taskValue) { input.value = ''; return; }
            
            tasks.push({ 
                id: Date.now(), title: taskValue, category: cat, 
                date: document.getElementById('dateFilter').value, 
                completed: false, inProgress: false, isPrivate: false, subtasks: [] 
            });
            input.value = ''; 
            await saveToFirebase();
        };

        // --- NEW POPUP LOGIC FOR SECTIONS ---
        window.openSectionModal = (id) => {
            document.getElementById('sectionOverlay').style.display = 'block';
            const sec = document.getElementById('col-' + id);
            sec.classList.add('popup-mode');
        };

        window.closeSectionModal = () => {
            document.getElementById('sectionOverlay').style.display = 'none';
            document.querySelectorAll('.col-section').forEach(el => {
                el.classList.remove('popup-mode');
            });
        };

        window.togglePrivacy = async (e, id) => {
            e.stopPropagation(); if(!currentUser) return;
            const t = tasks.find(x => x.id === id); t.isPrivate = !t.isPrivate;
            await saveToFirebase();
        };

        window.toggleSubPrivacy = async (sid) => {
            if(!currentUser) return;
            const t = tasks.find(x => x.id === currentOpenTaskId);
            const s = t.subtasks.find(x => x.id === sid); s.isPrivate = !s.isPrivate;
            await saveToFirebase(); renderSub();
        };

        window.toggleMain = async (id) => {
            if(!currentUser) return alert("Login to modify tasks!");
            const t = tasks.find(x => x.id === id);
            const wasDone = isCatDone(t.category, t.date);
            t.completed = !t.completed; 
            if(t.completed) t.inProgress = false; 
            await saveToFirebase();
            if(!wasDone && isCatDone(t.category, t.date)) showCongrats(t.category);
        };

        window.toggleProgressMain = async (e, id) => {
            e.stopPropagation(); if(!currentUser) return alert("Login to modify tasks!");
            const t = tasks.find(x => x.id === id);
            if(t.completed) return; t.inProgress = !t.inProgress;
            await saveToFirebase();
        };

        window.toggleSub = async (sid) => {
            if(!currentUser) return alert("Login to modify subtasks!");
            const t = tasks.find(x => x.id === currentOpenTaskId);
            const wasDone = isCatDone(t.category, t.date);
            const s = t.subtasks.find(x => x.id === sid);
            s.done = !s.done; if(s.done) s.inProgress = false; 
            await saveToFirebase(); renderSub();
            if(!wasDone && isCatDone(t.category, t.date)) showCongrats(t.category);
        };

        window.toggleProgressSub = async (sid) => {
            if(!currentUser) return alert("Login to modify tasks!");
            const t = tasks.find(x => x.id === currentOpenTaskId);
            const s = t.subtasks.find(x => x.id === sid);
            if(s.done) return; s.inProgress = !s.inProgress;
            await saveToFirebase(); renderSub();
        };

        window.addSubtask = async () => {
            if(!currentUser) return alert("Login to add steps!");
            const input = document.getElementById('mSubIn'); const val = input.value.trim();
            if(!val) return;
            tasks.find(x => x.id === currentOpenTaskId).subtasks.push({ 
                id: Date.now(), text: val, done: false, isPrivate: false, inProgress: false 
            });
            input.value = ''; await saveToFirebase(); renderSub();
        };

        window.deleteT = async (id) => {
            if(!currentUser) return;
            if(confirm("Delete task?")) {
                tasks = tasks.filter(x => x.id !== id); await saveToFirebase();
            }
        };

        window.deleteS = async (sid) => {
            if(!currentUser) return;
            if(confirm("Delete subtask?")) {
                const t = tasks.find(x => x.id === currentOpenTaskId);
                t.subtasks = t.subtasks.filter(x => x.id !== sid);
                await saveToFirebase(); renderSub();
            }
        };

        window.deleteCurrentDate = async () => {
            if(!currentUser) return;
            const date = document.getElementById('dateFilter').value;
            if(confirm(`Are you sure you want to delete ALL tasks for ${date}?`)) {
                tasks = tasks.filter(x => x.date !== date); await saveToFirebase();
            }
        };

        window.moveIncompleteToToday = async () => {
            if (!currentUser) return;
            const currentDate = document.getElementById('dateFilter').value;
            const todayDate = new Date().toLocaleDateString('en-CA');
            if (currentDate === todayDate) return alert("You are already on today's timeline! ⚡");

            const tasksToMove = tasks.filter(t => 
                t.date === currentDate && 
                (t.subtasks.length > 0 ? !t.subtasks.every(s => s.done) : !t.completed)
            );

            if (tasksToMove.length === 0) return alert("No incomplete tasks to move!");
            if (!confirm(`Move ${tasksToMove.length} tasks to today (${todayDate})?`)) return;

            tasksToMove.forEach(oldTask => {
                tasks.push({
                    ...oldTask, id: Date.now() + Math.random(), date: todayDate,
                    inProgress: false, originalDate: oldTask.date,
                    subtasks: oldTask.subtasks.filter(s => !s.done).map(s => ({...s, inProgress: false}))
                });
            });
            await saveToFirebase();
            document.getElementById('dateFilter').value = todayDate;
            renderApp();
        };

        window.saveEdit = async () => {
            if(!currentUser) return;
            const t = tasks.find(x => x.id === currentEditData.id);
            const newVal = document.getElementById('editField').value.trim();
            if(!newVal) return;
            if(currentEditData.type === 'main') t.title = newVal;
            else t.subtasks.find(x => x.id === currentEditData.sid).text = newVal;
            document.getElementById('editModal').style.display = 'none'; 
            await saveToFirebase(); if(currentOpenTaskId) renderSub();
        };

        window.moveItem = async (type, id, direction) => {
            if(!currentUser) return;
            if (type === 'task') {
                const index = tasks.findIndex(t => t.id === id);
                const task = tasks[index];
                const sameGroup = tasks.filter(t => t.date === task.date && t.category === task.category);
                const subIndex = sameGroup.findIndex(t => t.id === id);
                
                if (direction === -1 && subIndex > 0) {
                    const targetId = sameGroup[subIndex-1].id;
                    const targetIndex = tasks.findIndex(t => t.id === targetId);
                    [tasks[index], tasks[targetIndex]] = [tasks[targetIndex], tasks[index]];
                } else if (direction === 1 && subIndex < sameGroup.length - 1) {
                    const targetId = sameGroup[subIndex+1].id;
                    const targetIndex = tasks.findIndex(t => t.id === targetId);
                    [tasks[index], tasks[targetIndex]] = [tasks[targetIndex], tasks[index]];
                }
            } else {
                const t = tasks.find(x => x.id === currentOpenTaskId);
                const index = t.subtasks.findIndex(s => s.id === id);
                if (direction === -1 && index > 0) {
                    [t.subtasks[index], t.subtasks[index-1]] = [t.subtasks[index-1], t.subtasks[index]];
                } else if (direction === 1 && index < t.subtasks.length - 1) {
                    [t.subtasks[index], t.subtasks[index+1]] = [t.subtasks[index+1], t.subtasks[index]];
                }
                renderSub();
            }
            await saveToFirebase();
        };

        window.renderApp = () => {
            const date = document.getElementById('dateFilter').value;
            
            const sections = [
                { cat: 'প্লানওয়াইজ পড়া', idPrefix: 'secA', color: '#6366f1', emoji: '🎯' },
                { cat: 'CT এর পড়া', idPrefix: 'secB', color: '#8b5cf6', emoji: '🚀' },
                { cat: 'MT এর পড়া', idPrefix: 'secC', color: '#10b981', emoji: '💡' },
                { cat: 'Others Tasks', idPrefix: 'secD', color: '#f59e0b', emoji: '🔥' }
            ];

            sections.forEach(sec => {
                const container = document.getElementById(sec.idPrefix + 'List');
                if(!container) return;
                container.innerHTML = '';
                
                let filtered = tasks.filter(t => {
                    const basicFilter = (t.date === date && t.category === sec.cat);
                    return !currentUser ? (basicFilter && !t.isPrivate) : basicFilter;
                });
                
                filtered.sort((a, b) => {
                    const getPriority = (t) => {
                        const isDone = t.subtasks.length > 0 ? t.subtasks.every(s => s.done) : t.completed;
                        if (isDone) return 2; 
                        const isInProgress = t.inProgress || t.subtasks.some(s => s.inProgress);
                        if (isInProgress) return 0; 
                        return 1; 
                    };
                    return getPriority(a) - getPriority(b);
                });

                let earned = 0, total = 0;
                filtered.forEach((t) => {
                    const subT = t.subtasks.length, subD = t.subtasks.filter(s => s.done).length;
                    const isDone = subT > 0 ? (subD === subT && subT > 0) : t.completed;
                    const per = subT > 0 ? Math.round((subD/subT)*100) : (t.completed ? 100 : 0);
                    earned += per; total += 100;

                    const isInProgress = !isDone && (t.inProgress || t.subtasks.some(s => s.inProgress));

                    const div = document.createElement('div');
                    div.className = `task-item ${isDone ? 'completed' : ''} ${isInProgress ? 'in-progress' : ''}`;
                    div.onclick = (e) => { e.stopPropagation(); openSubPopup(t.id); };
                    
                    div.innerHTML = `
                        <div class="task-main">
                            <div style="flex:1">
                                ${isInProgress ? `<span class="progress-badge" style="background:${sec.color}">In Progress</span><br>` : ''}
                                <span style="font-weight: 500;">${t.isPrivate ? '🔒 ' : ''}${t.title}</span>
                                ${t.originalDate ? `<br><span style="font-size: 0.75rem; color: var(--text-muted); font-style: italic;">Moved from: ${t.originalDate}</span>` : ''}
                            </div>
                            <div class="task-action-btns" style="display:flex; align-items:center; gap:8px;">
                                ${(!isDone && !subT && currentUser) ? `<button class="btn-progress" onclick="toggleProgressMain(event, ${t.id})">${t.inProgress?'⚡':'▶'}</button>` : ''}
                                ${!subT ? `<button class="btn action-toggle-btn" style="background:${t.completed?'var(--task-bg)':'transparent'}; color:${t.completed?sec.color:'var(--text-muted)'}; border: 1px solid ${t.completed?sec.color:'var(--border-light)'}; display:${!currentUser?'none':'block'}" onclick="event.stopPropagation(); toggleMain(${t.id})">✔</button>` : `<b style="color:${sec.color};">${per}%</b>`}
                            </div>
                        </div>
                        <div class="controls admin-only" style="display:${!currentUser?'none':'flex'}" onclick="event.stopPropagation()">
                            <button class="icon-btn" onclick="togglePrivacy(event, ${t.id})">${t.isPrivate ? '🔓' : '🔒'}</button>
                            <button class="icon-btn" onclick="moveItem('task', ${t.id}, -1)">▲</button>
                            <button class="icon-btn" onclick="moveItem('task', ${t.id}, 1)">▼</button>
                            <button class="icon-btn" onclick="openEdit('main', ${t.id})">✏️</button>
                            <button class="icon-btn" style="color:#ef4444; border-color:rgba(239,68,68,0.3);" onclick="deleteT(${t.id})">🗑️</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
                
                const catPer = total > 0 ? Math.round((earned/total)*100) : 0;
                const bar = document.getElementById(sec.idPrefix + 'Bar');
                bar.style.width = catPer + '%';
                bar.style.backgroundColor = sec.color;
                bar.style.boxShadow = `0 0 10px ${sec.color}`;
                document.getElementById(sec.idPrefix + 'Per').innerText = catPer + '%';
            });
            updateHistoryUI();
        };

        window.openSubPopup = (id) => {
            currentOpenTaskId = id; renderSub();
            document.getElementById('subtaskModal').style.display = 'flex';
        };

        window.renderSub = () => {
            const t = tasks.find(x => x.id === currentOpenTaskId);
            if(!t) return;
            const sortedSubs = [...t.subtasks].sort((a, b) => {
                const getSubPriority = (s) => {
                    if (s.done) return 2; if (s.inProgress) return 0; return 1;
                };
                return getSubPriority(a) - getSubPriority(b);
            });
            let visibleSubs = sortedSubs.filter(s => currentUser ? true : !s.isPrivate);
            
            document.getElementById('mTitle').innerText = t.title;
            document.getElementById('mSubList').innerHTML = visibleSubs.map(s => `
                <div class="sub-item ${s.inProgress ? 'in-progress-sub' : ''}" style="${s.done ? 'opacity:0.5; border-color: transparent;' : ''}">
                    <input type="checkbox" style="width: 18px; height: 18px; cursor:pointer; accent-color: #10b981; display:${!currentUser?'none':'block'}" ${s.done?'checked':''} onchange="toggleSub(${s.id})">
                    <div style="flex:1; margin-left:10px;">
                        ${s.inProgress ? '<span class="progress-badge" style="background:#6366f1; font-size:0.6rem;">In Progress</span><br>' : ''}
                        <span style="${s.done?'text-decoration:line-through; color: var(--text-muted);':''}">${s.isPrivate ? '🔒 ' : ''}${s.text}</span>
                    </div>
                    <div class="controls admin-only" style="display:${!currentUser?'none':'flex'}; gap:4px;">
                        ${!s.done ? `<button class="icon-btn" onclick="toggleProgressSub(${s.id})">${s.inProgress?'⚡':'▶'}</button>` : ''}
                        <button class="icon-btn" onclick="toggleSubPrivacy(${s.id})">${s.isPrivate ? '🔓' : '🔒'}</button>                        
                        <button class="icon-btn" onclick="moveItem('sub', ${s.id}, -1)">▲</button>
                        <button class="icon-btn" onclick="moveItem('sub', ${s.id}, 1)">▼</button>
                        <button class="icon-btn" onclick="openEdit('sub', ${t.id}, ${s.id})">✏️</button>
                        <button class="icon-btn" style="color:#ef4444;" onclick="deleteS(${s.id})">✖</button>
                    </div>
                </div>
            `).join('') || '<p style="text-align:center; color:var(--text-muted)">No steps yet.</p>';
        };

        window.openEdit = (type, id, sid=null) => {
            if(!currentUser) return;
            currentEditData = {type, id, sid};
            const t = tasks.find(x => x.id === id);
            document.getElementById('editField').value = type==='main' ? t.title : t.subtasks.find(x => x.id === sid).text;
            document.getElementById('editModal').style.display = 'flex';
        };

        function isCatDone(cat, date) {
            const list = tasks.filter(t => t.date === date && t.category === cat);
            return list.length > 0 && list.every(t => t.subtasks.length > 0 ? t.subtasks.every(s => s.done) : t.completed);
        }

        function updateHistoryUI() {
            const uniqueDates = [...new Set(tasks.map(t => t.date))].sort();
            const container = document.getElementById('dateHistory');
            const current = document.getElementById('dateFilter').value;
            container.innerHTML = uniqueDates.map(d => `
                <button class="pill ${d === current ? 'active' : ''}" onclick="setDate('${d}')">${d}</button>
            `).join('');
        }

        window.setDate = (d) => { document.getElementById('dateFilter').value = d; renderApp(); };
        window.closeModal = () => { document.getElementById('subtaskModal').style.display = 'none'; currentOpenTaskId = null; };
        window.closeEdit = () => { document.getElementById('editModal').style.display = 'none'; };
        window.closeCongrats = () => { document.getElementById('congratsModal').style.display = 'none'; };
        
        window.openLogin = async () => { 
            const sEmail = localStorage.getItem('savedEmail');
            const sPass = localStorage.getItem('savedPass');
            if(sEmail && sPass) {
                try {
                    await setPersistence(auth, inMemoryPersistence);
                    await signInWithEmailAndPassword(auth, sEmail, sPass);
                    return; 
                } catch (e) {
                    document.getElementById('emailInput').value = sEmail;
                    document.getElementById('passInput').value = sPass;
                }
            }
            document.getElementById('loginOverlay').style.display = 'flex'; 
        };
        window.closeLogin = () => { document.getElementById('loginOverlay').style.display = 'none'; };

        function showCongrats(cat) {
            confetti({particleCount: 250, spread: 100, origin: {y: 0.6}, colors: ['#6366f1', '#10b981', '#f59e0b', '#8b5cf6']});
            const sound = document.getElementById('successSound');
            sound.currentTime = 0; sound.play().catch(e => console.log("Sound muted"));
            document.getElementById('congratsTitle').innerText = "MT এর পড়াOMPLETED!";
            document.getElementById('congratsModal').style.display = 'flex';
        }

        window.downloadPDF = () => {
            const date = document.getElementById('dateFilter').value;
            const dayTasks = tasks.filter(t => currentUser ? t.date === date : (t.date === date && !t.isPrivate));
            if (dayTasks.length === 0) return alert("No tasks found for this date!");

            const element = document.createElement('div');
            element.style.padding = "40px";
            element.style.fontFamily = "'Inter', sans-serif";
            element.style.color = "#0f172a";
            element.style.background = "#ffffff";

            let content = `
                <div style="text-align:center; margin-bottom:30px;">
                    <h1 style="margin:0; color:#0f172a; font-size:26px; font-weight:700;">DAILY FOCUS LOG</h1>
                    <p style="color:#64748b; font-size:15px; margin-top:5px;">Timeline: <b>${date}</b></p>
                    <div style="height:3px; width:50px; background:#6366f1; margin:15px auto; border-radius:5px;"></div>
                </div>
            `;

            ['প্লানওয়াইজ পড়া', 'CT এর পড়া', 'MT এর পড়া', 'Others Tasks'].forEach(cat => {
                const catTasks = dayTasks.filter(t => t.category === cat);
                if(catTasks.length > 0) {
                    content += `<h3 style="color:#334155; border-bottom:1px solid #e2e8f0; padding-bottom:8px; margin-top:25px; font-weight:600;">${cat}</h3>`;
                    catTasks.forEach(t => {
                        const visibleSubs = t.subtasks.filter(s => currentUser ? true : !s.isPrivate);
                        const isDone = visibleSubs.length > 0 ? visibleSubs.every(s => s.done) : t.completed;
                        
                        content += `
                            <div style="margin-bottom:12px; padding:10px 15px; border-radius:8px; border-left:4px solid ${isDone?'#10b981':'#cbd5e1'}; background:#f8fafc;">
                                <div style="font-weight:500; font-size:14px; color:#1e293b;">
                                    ${t.isPrivate ? '🔒 ' : ''}${t.title}
                                </div>
                                ${visibleSubs.length > 0 ? `<ul style="margin:6px 0 0 20px; padding:0; color:#475569; font-size:13px;">` + visibleSubs.map(s => `<li style="margin-bottom:3px;">${s.done?'✓':'○'} ${s.isPrivate ? '[Private] ' : ''}${s.text}</li>`).join('') + `</ul>` : ''}
                            </div>
                        `;
                    });
                }
            });

            element.innerHTML = content; document.body.appendChild(element);
            const opt = {
                margin: 0.5, filename: `Focus_Log_${date}.pdf`,
                image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save().then(() => document.body.removeChild(element));
        };
    </script>

    <style>
        /* ========================================================
           MODERN THEME VARIABLES (Light & Dark Auto Support)
           ======================================================== */
        :root {
            --font-main: 'Inter', sans-serif;
            --font-head: 'Outfit', sans-serif;
            
            /* Motivating Accents */
            --color-secA: #6366f1; /* Indigo */
            --color-secB: #8b5cf6; /* Purple */
            --color-secC: #10b981; /* Emerald */
            --color-secD: #f59e0b; /* Amber */
            
            --radius: 16px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* LIGHT MODE (Default & Fallback) */
        :root, [data-theme="light"] {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-card-hover: #f8fafc;
            --bg-modal: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --task-bg: #ffffff;
            --task-border: #cbd5e1;
            --task-hover: #f1f5f9;
            --input-bg: #ffffff;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --shadow-popup: 0 20px 40px rgba(0, 0, 0, 0.15);
            --overlay-bg: rgba(15, 23, 42, 0.5);
            --subitem-bg: rgba(0, 0, 0, 0.03);
            --popup-bg: #ffffff;
        }

        /* DARK MODE */
        [data-theme="dark"] {
            --bg-body: #0B1120;
            --bg-card: #1E293B;
            --bg-card-hover: #334155;
            --bg-modal: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-light: rgba(255, 255, 255, 0.08);
            --task-bg: #0f172a;
            --task-border: #334155;
            --task-hover: #1e293b;
            --input-bg: #0f172a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-popup: 0 20px 50px rgba(0, 0, 0, 0.6);
            --overlay-bg: rgba(11, 17, 32, 0.85);
            --subitem-bg: rgba(255, 255, 255, 0.03);
            --popup-bg: #1e293b;
        }

        body { 
            font-family: var(--font-main);
            background-color: var(--bg-body);
            margin: 0; 
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-secA); }

        .is-logged-in #moveTodayBtn {
            position: fixed; bottom: 25px; left: 25px; z-index: 999;
            display: flex !important; align-items: center; justify-content: center;
            cursor: pointer; background: #6366f1 !important;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4) !important;
            border-radius: 50%; width: 55px; height: 55px; transition: var(--transition);
            border: none; color: white; font-size: 1.5rem;
        }
        .is-logged-in #moveTodayBtn:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6) !important; }

        .task-item.in-progress {
            border-left: 4px solid var(--color-secA) !important;
            background: var(--subitem-bg) !important;
        }
        
        .progress-badge {
            display: inline-block; font-size: 0.7rem; color: #fff;
            font-weight: 600; padding: 3px 8px; border-radius: 4px;
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .btn-progress {
            background: var(--border-light); border: none; color: var(--text-main);
            padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer;
            font-size: 0.9rem; transition: var(--transition); opacity: 0; display: none; 
        }
        .is-logged-in .btn-progress { display: inline-block; }
        .btn-progress:hover { background: var(--text-muted); color: #fff; }
        @media (min-width: 769px) { .task-item:hover .btn-progress { opacity: 1; } }
        
        .in-progress-sub { background: var(--subitem-bg) !important; }

        /* Modals & Overlays */
        #loginOverlay, .modal-overlay { 
            position: fixed; inset: 0; background: var(--overlay-bg); 
            display: none; justify-content: center; align-items: center; 
            z-index: 6000; backdrop-filter: blur(5px); 
        }
        /* Specific overlay for the sections */
        #sectionOverlay { z-index: 5000; }

        .login-card, .modal-card { 
            background: var(--bg-modal); padding: 40px; border-radius: var(--radius); 
            text-align: center; width: 380px; box-shadow: var(--shadow-popup); 
            border: 1px solid var(--border-light); position: relative; color: var(--text-main);
        }
        .login-card h2, .modal-card h3 { 
            margin-top: 0; font-family: var(--font-head); font-size: 2rem; 
            font-weight: 600; margin-bottom: 25px; color: var(--text-main);
        }

        .pass-container { position: relative; width: 100%; margin-bottom: 20px; display: flex; align-items: center; }
        .pass-container input { width: 100%; box-sizing: border-box; }
        .toggle-btn { position: absolute; right: 15px; background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0; }

        #app { 
            display: flex; flex-direction: column; padding: 30px 40px; 
            max-width: 1500px; margin: 0 auto; min-height: 100vh; box-sizing: border-box;
            opacity: 0; transform: translateY(10px); transition: opacity 0.4s, transform 0.4s;
        }

        /* Header Area */
        .top-container {
            display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; flex-wrap: wrap; gap: 20px;
        }
        
        .headline-wrapper h1 { 
            font-family: var(--font-head); font-size: 2.5rem; font-weight: 700; 
            margin: 0 0 15px 0; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px;
        }
        .headline-wrapper h1 span { color: var(--color-secA); }

        .history-pills { display: flex; gap: 10px; flex-wrap: wrap; }
        .pill { 
            cursor: pointer; padding: 6px 14px; border-radius: 20px; 
            font-size: 0.85rem; font-weight: 500; transition: var(--transition); 
            background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border-light);
        }
        .pill.active { background: var(--text-main); color: var(--bg-body); border-color: var(--text-main); font-weight: 600; }
        .pill:hover:not(.active) { background: var(--bg-card-hover); color: var(--text-main); }

        .controls-wrapper { display: flex; align-items: center; gap: 15px; background: var(--bg-card); padding: 10px 20px; border-radius: var(--radius); border: 1px solid var(--border-light); }

        /* Inputs & Buttons */
        .add-zone { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"], input[type="password"], input[type="email"], input[type="date"] { 
            flex: 1; padding: 14px 18px; background: var(--input-bg); color: var(--text-main);
            border: 1px solid var(--border-light); border-radius: var(--radius-sm); 
            outline: none; font-family: var(--font-main); transition: var(--transition); font-size: 0.95rem; 
        }
        input:focus { border-color: var(--color-secA); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: var(--calendar-filter, invert(0)); cursor: pointer; }
        [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); }

        .btn { 
            border: none; padding: 10px 20px; border-radius: var(--radius-sm); 
            cursor: pointer; font-weight: 500; font-family: var(--font-main); 
            transition: var(--transition); 
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn-add { 
            background: var(--text-muted); color: white; display: flex; align-items: center; 
            justify-content: center; font-size: 1.5rem; width: 48px; height: 48px; padding: 0; flex-shrink: 0; border-radius: var(--radius-sm);
        }
        .btn-add:hover { background: var(--text-main); }

        /* ========================================================
           4-COLUMN EQUAL GRID & POPUP LAYOUT
           ======================================================== */
        .dashboard-grid { 
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
        }
        
        .col-section { 
            background: var(--bg-card); border-radius: var(--radius); 
            border: 1px solid var(--border-light); 
            display: flex; flex-direction: column; 
            height: 480px; /* Standard Height when normally sitting in grid */
            transition: transform 0.2s, box-shadow 0.2s; 
            cursor: pointer; overflow: hidden; position: relative;
        }
        .col-section:hover:not(.popup-mode) { 
            transform: translateY(-5px); box-shadow: var(--shadow); border-color: var(--text-muted);
        }

        /* POPUP MODAL STATE (Triggered via JS class) */
        .col-section.popup-mode {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90vw; max-width: 600px; height: 85vh; max-height: 800px;
            z-index: 5001; background: var(--popup-bg);
            box-shadow: var(--shadow-popup); margin: 0; cursor: default;
            border-radius: var(--radius); border: 1px solid var(--border-light);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .col-section.popup-mode:hover { transform: translate(-50%, -50%); box-shadow: var(--shadow-popup); }

        /* Close Button inside Popup */
        .close-popup-btn { 
            display: none; background: transparent; border: none; font-size: 1.5rem; 
            color: var(--text-muted); cursor: pointer; transition: 0.2s; padding: 0;
        }
        .close-popup-btn:hover { color: #ef4444; transform: scale(1.1); }
        .col-section.popup-mode .close-popup-btn { display: block; margin-left: auto; }
        
        /* Section Header */
        .sec-header { 
            padding: 25px 20px 20px; flex-shrink: 0; display: flex; flex-direction: column; transition: var(--transition);
        }
        
        .sec-title { 
            font-family: var(--font-head); font-size: 1.3rem; font-weight: 600; 
            display: flex; align-items: center; gap: 10px; color: var(--text-main); 
        }
        .col-section.popup-mode .sec-title { width: 100%; justify-content: space-between; font-size: 1.6rem; }
        
        .sec-stats { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .sec-stats span { font-weight: 700; font-size: 1.5rem; }

        .sec-bar-outer { width: 100%; height: 6px; background: var(--border-light); border-radius: 10px; overflow: hidden; margin-top: 12px; }
        .sec-bar-inner { height: 100%; width: 0%; transition: width 0.8s ease; border-radius: 10px; }

        /* MT এর পড়াontent */
        .section-content { padding: 0 20px 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; }

        /* Tasks styling inside content */
        .task-item { 
            background: var(--task-bg); border: 1px solid var(--task-border); border-radius: var(--radius-sm); 
            margin-bottom: 12px; padding: 16px; cursor: pointer; transition: var(--transition); 
            display: flex; flex-direction: column; gap: 10px; position: relative; 
        }
        .task-item:hover { border-color: var(--text-muted); background: var(--task-hover); }
        
        .task-item.completed { background: transparent; border: 1px dashed var(--task-border); opacity: 0.6; }
        .task-item.completed .task-main { text-decoration: line-through; color: var(--text-muted); }
        
        .task-main { display: flex; justify-content: space-between; align-items: center; }
        
        .controls { display: flex; gap: 5px; opacity: 0; transition: var(--transition); }
        .is-logged-in .task-item:hover .controls, .is-logged-in .sub-item:hover .controls { opacity: 1; }
        
        .sub-item { 
            display: flex; align-items: center; gap: 12px; background: var(--subitem-bg); 
            padding: 12px; border-radius: var(--radius-sm); margin-bottom: 8px; border: 1px solid transparent; transition: var(--transition); 
        }
        .sub-item:hover { border-color: var(--border-light); }

        .icon-btn { 
            background: transparent; color: var(--text-muted); width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; border-radius: 6px; 
            border: 1px solid var(--border-light); cursor: pointer; font-size: 0.85rem; transition: var(--transition);
        }
        .icon-btn:hover { background: var(--task-border); color: var(--text-main); }
        
        .action-toggle-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; padding: 0; font-size: 1rem; }

        /* Theme Toggle Button */
        .theme-toggle-btn { background: transparent; border: none; font-size: 1.5rem; cursor: pointer; margin-right: 10px; }

        /* Responsive */
        @media (max-width: 1200px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            #app { padding: 20px; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .col-section { height: 400px; } /* Slightly smaller on mobile */
            .col-section.popup-mode { width: 95vw; height: 90vh; }
            .controls-wrapper { width: 100%; justify-content: space-between; box-sizing: border-box; flex-wrap: wrap;}
            .is-logged-in .controls { opacity: 1 !important; display: flex !important; }
            .is-logged-in .btn-progress { opacity: 1 !important; } 
            body:not(.is-logged-in) .controls, body:not(.is-logged-in) .btn-progress { display: none !important; }
            .is-logged-in #moveTodayBtn { bottom: 20px; left: 20px; }
        }
    </style>
</head>

<div id="congratsModal" class="modal-overlay">
    <div class="modal-card" style="text-align: center; border: 2px solid var(--color-secC);">
        <div style="font-size: 4rem; margin-bottom: 10px;">🎉</div>
        <h2 id="congratsTitle" style="color: var(--color-secC); font-size: 2rem; margin-bottom: 20px;">Great Job!</h2>
        <button class="btn btn-add" style="width: 100%; padding: 12px; height: auto; font-size: 1.1rem; background: var(--color-secC); color: #fff;" onclick="closeCongrats()">Continue</button>
    </div>
</div>

<div id="editModal" class="modal-overlay" onclick="closeEdit()">
    <div class="login-card" style="width: 90%; max-width: 400px;" onclick="event.stopPropagation()">
        <h3 id="editModalTitle" style="font-size:1.5rem">Edit Task</h3>
        <input type="text" id="editField" style="width:100%; margin-bottom:20px; box-sizing: border-box;">
        <button class="btn btn-add" style="width:100%; height: auto; padding:12px; font-size: 1.1rem; background:var(--color-secA); color: white;" onclick="saveEdit()">Save Changes</button>
    </div>
</div>

<script>
    // --- THEME MANAGEMENT LOGIC ---
    const themeBtn = document.getElementById('themeToggleBtn');
    
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('userTheme', theme);
        themeBtn.innerText = theme === 'dark' ? '☀️' : '🌙';
    }

    function initTheme() {
        const savedTheme = localStorage.getItem('userTheme');
        if (savedTheme) {
            applyTheme(savedTheme);
        } else {
            // Check system preference
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(prefersDark ? 'dark' : 'light');
        }
    }

    // Auto-listen to system changes (only if user hasn't explicitly set a preference manually)
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
        if (!localStorage.getItem('userTheme')) {
            applyTheme(event.matches ? 'dark' : 'light');
        }
    });

    window.toggleTheme = () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    };

    // Run theme initialization on load
    initTheme();

    // Security
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || 
            (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || 
            (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
            return false;
        }
    };
</script>
</body>
</html>

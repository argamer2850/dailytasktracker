<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Task Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"> 
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzQQqJh_AAHT60V7Vv9WhtVVKbtY_a3Vk",
            authDomain: "dailytasktracker-a5d86.firebaseapp.com",
            projectId: "dailytasktracker-a5d86",
            storageBucket: "dailytasktracker-a5d86.firebasestorage.app",
            messagingSenderId: "903078792164",
            appId: "1:903078792164:web:e12020a890a3f754ba95f1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let tasks = [];
        let currentUser = null;
        let currentOpenTaskId = null;
        let currentEditData = null;
        let currentDateStr = new Date().toLocaleDateString('en-CA'); 

        async function autoCleanupTasks(allTasks, userUid) {
            const today = new Date();
            const sevenDaysAgo = new Date(today);
            sevenDaysAgo.setDate(today.getDate() - 7);
            const thresholdDate = sevenDaysAgo.toLocaleDateString('en-CA');
            const updatedTasks = allTasks.filter(task => task.date >= thresholdDate || task.date === 'Everyday');
            if (updatedTasks.length !== allTasks.length) {
                await setDoc(doc(db, "users", userUid), { tasks: updatedTasks });
                return updatedTasks;
            }
            return allTasks;
        }

        function getSmartDate(allTasks) {
            const today = new Date().toLocaleDateString('en-CA');
            const hasTaskToday = allTasks.some(t => t.date === today);
            if (hasTaskToday) return today;
            return 'Everyday';
        }

        function migrateOldCategories(taskArray) {
            return taskArray.map(t => {
                if(t.category === 'Study') t.category = 'প্লানওয়াইজ পড়া';
                if(t.category === 'Other') t.category = 'CT এর পড়া';
                return t;
            });
        }

        window.handleAuth = async () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            if(!email || !pass) return alert("Please fill all fields");

            try {
                await setPersistence(auth, inMemoryPersistence);
                await signInWithEmailAndPassword(auth, email, pass);
                localStorage.setItem('savedEmail', email);
                localStorage.setItem('savedPass', pass);
                document.getElementById('loginOverlay').style.display = 'none';
            } catch (error) {
                alert(error.message);
            }
        };

        window.togglePass = () => {
            const passInput = document.getElementById('passInput');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passInput.type === "password") {
                passInput.type = "text"; toggleIcon.innerText = "👁️‍🗨️";
            } else {
                passInput.type = "password"; toggleIcon.innerText = "👁️";
            }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        async function loadViewOnlyData() {
            const publicDocRef = doc(db, "users", "Sx0d90b41FPeF9l6qa7kJCZirJp2"); 
            onSnapshot(publicDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    let allTasks = docSnap.data().tasks || [];
                    tasks = migrateOldCategories(allTasks);
                    window.setDate(getSmartDate(tasks));
                } else {
                    renderApp();
                }
            });
        }

        onAuthStateChanged(auth, (user) => {
            document.getElementById('app').style.opacity = '1';
            document.getElementById('app').style.transform = 'translateY(0)';
            
            if (user) {
                currentUser = user;
                document.getElementById('loginBtnNav').style.display = 'none';
                document.getElementById('logoutBtnNav').style.display = 'inline-block';
                document.getElementById('deleteDayBtn').style.display = 'inline-block';
                document.getElementById('generalTasksBtn').style.display = 'inline-block'; 
                document.body.classList.add('is-logged-in'); 
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');

                
                onSnapshot(doc(db, "users", user.uid), async (docSnap) => {
                    if (docSnap.exists()) {
                        let allTasks = docSnap.data().tasks || [];
                        allTasks = migrateOldCategories(allTasks);
                        allTasks = await autoCleanupTasks(allTasks, user.uid);
                        tasks = allTasks;
                        window.setDate(getSmartDate(tasks));
                    } else { 
                        tasks = []; 
                        renderApp();
                    }
                });
            } else {
                currentUser = null;
                document.body.classList.remove('is-logged-in');
                document.getElementById('loginBtnNav').style.display = 'inline-block';
                document.getElementById('logoutBtnNav').style.display = 'none';
                document.getElementById('deleteDayBtn').style.display = 'none';
                document.getElementById('generalTasksBtn').style.display = 'none'; 
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                loadViewOnlyData(); 
            }
        });

        async function saveToFirebase() {
            if (currentUser) {
                await setDoc(doc(db, "users", currentUser.uid), { tasks: tasks });
            } else {
                alert("You are in View Only mode. Please login to save changes.");
            }
        }

        window.addTask = async (cat) => {
            if(!currentUser) return alert("Login to add tasks!");
            
            let inputId = '';
            if(cat === 'প্লানওয়াইজ পড়া') inputId = 'secAIn';
            if(cat === 'CT এর পড়া') inputId = 'secBIn';
            if(cat === 'MT এর পড়া') inputId = 'secCIn';
            if(cat === 'কলেজের পড়া') inputId = 'secFIn';
            if(cat === 'কোচিং এর পড়া') inputId = 'secEIn'; 
            if(cat === 'Others Tasks') inputId = 'secDIn';
            
            const input = document.getElementById(inputId);
            const taskValue = input.value.trim(); 
            if(!taskValue) { input.value = ''; return; }
            
            tasks.push({ 
                id: Date.now(), title: taskValue, category: cat, 
                date: currentDateStr, 
                completed: false, inProgress: false, isPrivate: false, isImportant: false, subtasks: [] 
            });
            input.value = ''; 
            await saveToFirebase();
        };

        window.openSectionModal = (id) => {
            document.getElementById('sectionOverlay').style.display = 'block';
            const sec = document.getElementById('col-' + id);
            sec.classList.add('popup-mode');
            setTimeout(() => sec.classList.add('show'), 10);
        };

        window.closeSectionModal = () => {
            document.querySelectorAll('.col-section.popup-mode').forEach(el => {
                el.classList.remove('show');
                setTimeout(() => el.classList.remove('popup-mode'), 300);
            });
            setTimeout(() => document.getElementById('sectionOverlay').style.display = 'none', 300);
        };

        window.togglePrivacy = async (e, id) => {
            e.stopPropagation(); if(!currentUser) return;
            const t = tasks.find(x => x.id === id); t.isPrivate = !t.isPrivate;
            await saveToFirebase();
        };
        
        window.toggleImportant = async (e, id) => {
            e.stopPropagation(); if(!currentUser) return;
            const t = tasks.find(x => x.id === id); t.isImportant = !t.isImportant;
            await saveToFirebase();
        };

        window.toggleSubPrivacy = async (sid) => {
            if(!currentUser) return;
            const t = tasks.find(x => x.id === currentOpenTaskId);
            const s = t.subtasks.find(x => x.id === sid); s.isPrivate = !s.isPrivate;
            await saveToFirebase(); renderSub();
        };

        window.toggleMain = async (id) => {
            if(!currentUser) return alert("Login to modify tasks!");
            const t = tasks.find(x => x.id === id);
            const wasDone = isCatDone(t.category, t.date);
            t.completed = !t.completed; 
            if(t.completed) t.inProgress = false; 
            await saveToFirebase();
            if(!wasDone && isCatDone(t.category, t.date)) showCongrats(t.category);
        };

        window.toggleProgressMain = async (e, id) => {
            e.stopPropagation(); if(!currentUser) return alert("Login to modify tasks!");
            const t = tasks.find(x => x.id === id);
            if(t.completed) return; t.inProgress = !t.inProgress;
            await saveToFirebase();
        };

        window.toggleSub = async (sid) => {
            if(!currentUser) return alert("Login to modify subtasks!");
            const t = tasks.find(x => x.id === currentOpenTaskId);
            const wasDone = isCatDone(t.category, t.date);
            const s = t.subtasks.find(x => x.id === sid);
            s.done = !s.done; if(s.done) s.inProgress = false; 
            await saveToFirebase(); renderSub();
            if(!wasDone && isCatDone(t.category, t.date)) showCongrats(t.category);
        };

        window.toggleProgressSub = async (sid) => {
            if(!currentUser) return alert("Login to modify tasks!");
            const t = tasks.find(x => x.id === currentOpenTaskId);
            const s = t.subtasks.find(x => x.id === sid);
            if(s.done) return; s.inProgress = !s.inProgress;
            await saveToFirebase(); renderSub();
        };

        window.addSubtask = async () => {
            if(!currentUser) return alert("Login to add steps!");
            const input = document.getElementById('mSubIn'); const val = input.value.trim();
            if(!val) return;
            tasks.find(x => x.id === currentOpenTaskId).subtasks.push({ 
                id: Date.now(), text: val, done: false, isPrivate: false, inProgress: false 
            });
            input.value = ''; await saveToFirebase(); renderSub();
        };

        window.deleteT = async (id) => {
            if(!currentUser) return;
            if(confirm("Delete task?")) {
                tasks = tasks.filter(x => x.id !== id); await saveToFirebase();
            }
        };

        window.deleteS = async (sid) => {
            if(!currentUser) return;
            if(confirm("Delete subtask?")) {
                const t = tasks.find(x => x.id === currentOpenTaskId);
                t.subtasks = t.subtasks.filter(x => x.id !== sid);
                await saveToFirebase(); renderSub();
            }
        };

        window.deleteCurrentDate = async () => {
            if(!currentUser) return;
            const displayDate = currentDateStr === 'Everyday' ? 'General Tasks' : currentDateStr;
            if(confirm(`Are you sure you want to delete ALL tasks for ${displayDate}?`)) {
                tasks = tasks.filter(x => x.date !== currentDateStr); await saveToFirebase();
            }
        };

        window.moveIncompleteToToday = async () => {
            if (!currentUser) return;
            const todayDate = new Date().toLocaleDateString('en-CA');
            if (currentDateStr === todayDate) return alert("You are already on today's timeline! ⚡");

            const tasksToMove = tasks.filter(t => 
                t.date === currentDateStr && 
                (t.subtasks.length > 0 ? !t.subtasks.every(s => s.done) : !t.completed)
            );

            if (tasksToMove.length === 0) return alert("No incomplete tasks to move!");
            const displayDate = currentDateStr === 'Everyday' ? 'General Tasks' : currentDateStr;
            if (!confirm(`Move ${tasksToMove.length} tasks from ${displayDate} to today (${todayDate})?`)) return;

            tasksToMove.forEach(oldTask => {
                tasks.push({
                    ...oldTask, id: Date.now() + Math.random(), date: todayDate,
                    inProgress: false, originalDate: displayDate,
                    subtasks: oldTask.subtasks.filter(s => !s.done).map(s => ({...s, inProgress: false}))
                });
            });
            await saveToFirebase();
            window.setDate(todayDate);
        };
        window.moveIncompleteToGeneral = async () => {
            if (!currentUser) return;
            if (currentDateStr === 'Everyday') return alert("You are already on General Tasks timeline! ⚡");
            const tasksToMove = tasks.filter(t => 
                t.date === currentDateStr && 
                (t.subtasks.length > 0 ? !t.subtasks.every(s => s.done) : !t.completed)
            );
            if (tasksToMove.length === 0) return alert("No incomplete tasks to move!");
            if (!confirm(`Are you sure you want to move ${tasksToMove.length} incomplete tasks to General Tasks?`)) return;
            tasksToMove.forEach(t => {
                t.date = 'Everyday';
                t.originalDate = currentDateStr; 
            });
            await saveToFirebase();
            window.setDate('Everyday'); 
        };

        window.moveAllToToday = async () => {
            if (!currentUser) return;
            const todayDate = new Date().toLocaleDateString('en-CA');
            if (currentDateStr === todayDate) return alert("You are already on today's timeline! ⚡");

            const tasksToMove = tasks.filter(t => t.date === currentDateStr);
            if (tasksToMove.length === 0) return alert("No tasks to move!");

            const displayDate = currentDateStr === 'Everyday' ? 'General Tasks' : currentDateStr;
            if (!confirm(`Move ALL ${tasksToMove.length} tasks from ${displayDate} to today (${todayDate})?`)) return;

            tasksToMove.forEach(oldTask => {
                tasks.push({
                    ...oldTask, id: Date.now() + Math.random(), date: todayDate, originalDate: displayDate
                });
            });
            await saveToFirebase();
            window.setDate(todayDate);
        };

        window.moveAllToGeneral = async () => {
            if (!currentUser) return;
            if (currentDateStr === 'Everyday') return alert("You are already on General Tasks timeline! ⚡");

            const tasksToMove = tasks.filter(t => t.date === currentDateStr);
            if (tasksToMove.length === 0) return alert("No tasks to move!");
            
            if (!confirm(`Are you sure you want to move ALL ${tasksToMove.length} tasks to General Tasks?`)) return;

            tasksToMove.forEach(t => {
                t.date = 'Everyday'; t.originalDate = currentDateStr;
            });

            await saveToFirebase();
            window.setDate('Everyday');
        };

        window.saveEdit = async () => {
            if(!currentUser) return;
            const t = tasks.find(x => x.id === currentEditData.id);
            const newVal = document.getElementById('editField').value.trim();
            if(!newVal) return;
            if(currentEditData.type === 'main') t.title = newVal;
            else t.subtasks.find(x => x.id === currentEditData.sid).text = newVal;
            closeEdit(); 
            await saveToFirebase(); if(currentOpenTaskId) renderSub();
        };

        window.moveItem = async (type, id, direction) => {
            if(!currentUser) return;
            if (type === 'task') {
                const index = tasks.findIndex(t => t.id === id);
                const task = tasks[index];
                const sameGroup = tasks.filter(t => t.date === task.date && t.category === task.category);
                const subIndex = sameGroup.findIndex(t => t.id === id);
                
                if (direction === -1 && subIndex > 0) {
                    const targetId = sameGroup[subIndex-1].id;
                    const targetIndex = tasks.findIndex(t => t.id === targetId);
                    [tasks[index], tasks[targetIndex]] = [tasks[targetIndex], tasks[index]];
                } else if (direction === 1 && subIndex < sameGroup.length - 1) {
                    const targetId = sameGroup[subIndex+1].id;
                    const targetIndex = tasks.findIndex(t => t.id === targetId);
                    [tasks[index], tasks[targetIndex]] = [tasks[targetIndex], tasks[index]];
                }
            } else {
                const t = tasks.find(x => x.id === currentOpenTaskId);
                const index = t.subtasks.findIndex(s => s.id === id);
                if (direction === -1 && index > 0) {
                    [t.subtasks[index], t.subtasks[index-1]] = [t.subtasks[index-1], t.subtasks[index]];
                } else if (direction === 1 && index < t.subtasks.length - 1) {
                    [t.subtasks[index], t.subtasks[index+1]] = [t.subtasks[index+1], t.subtasks[index]];
                }
                renderSub();
            }
            await saveToFirebase();
        };

        window.renderApp = () => {
            const sections = [
                { cat: 'প্লানওয়াইজ পড়া', idPrefix: 'secA', color: '#ef4444', emoji: '🎯' },
                { cat: 'CT এর পড়া', idPrefix: 'secB', color: '#8b5cf6', emoji: '🏫' },
                { cat: 'MT এর পড়া', idPrefix: 'secC', color: '#10b981', emoji: '📖' },
                { cat: 'কলেজের পড়া', idPrefix: 'secF', color: '#0ea5e9', emoji: '🎓' },
                { cat: 'কোচিং এর পড়া', idPrefix: 'secE', color: '#ec4899', emoji: '📚' }, 
                { cat: 'Others Tasks', idPrefix: 'secD', color: '#eab308', emoji: '❓' }
            ];

            sections.forEach(sec => {
                const container = document.getElementById(sec.idPrefix + 'List');
                const columnElement = document.getElementById('col-' + sec.idPrefix); 
                if(!container) return;
                
                container.innerHTML = '';
                
                let filtered = tasks.filter(t => {
                    const basicFilter = (t.date === currentDateStr && t.category === sec.cat);
                    return !currentUser ? (basicFilter && !t.isPrivate) : basicFilter;
                });

                const totalTasksElement = document.getElementById(sec.idPrefix + 'Total');
                if(totalTasksElement) {
                    const taskWord = filtered.length > 1 ? 'Tasks' : 'Task';
                    totalTasksElement.innerHTML = `📋 <strong style="color:var(--text-main); font-size:1.1em;">${filtered.length}</strong> ${taskWord}`;
                }

                if (!currentUser) {
                    columnElement.style.display = (filtered.length === 0) ? 'none' : 'flex';
                } else {
                    columnElement.style.display = 'flex';
                }
                
                filtered.sort((a, b) => {
                    const getPriority = (t) => {
                        const isDone = t.subtasks.length > 0 ? t.subtasks.every(s => s.done) : t.completed;
                        if (isDone) return 3; 
                        if (t.isImportant) return 0; 
                        const isInProgress = t.inProgress || t.subtasks.some(s => s.inProgress);
                        if (isInProgress) return 1; 
                        return 2; 
                    };
                    return getPriority(a) - getPriority(b);
                });

                let earned = 0, total = 0;
                filtered.forEach((t) => {
                    const subT = t.subtasks.length, subD = t.subtasks.filter(s => s.done).length;
                    const isDone = subT > 0 ? (subD === subT && subT > 0) : t.completed;
                    const per = subT > 0 ? Math.round((subD/subT)*100) : (t.completed ? 100 : 0);
                    earned += per; total += 100;

                    const isInProgress = !isDone && (t.inProgress || t.subtasks.some(s => s.inProgress));

                    const div = document.createElement('div');
                    div.style.setProperty('--sec-color', sec.color);
                    div.className = `task-item ${isDone ? 'completed' : ''} ${isInProgress ? 'in-progress' : ''} ${t.isImportant ? 'important-task' : ''}`;
                    div.onclick = (e) => { e.stopPropagation(); openSubPopup(t.id); };
                    
                    div.innerHTML = `
                        <div class="task-main">
                            <div style="flex:1">
                                ${isInProgress ? `<span class="progress-badge" style="background:${sec.color}">In Progress</span><br>` : ''}
                                <span class="task-text">${t.isPrivate ? '🔒 ' : ''}${t.isImportant ? `<span style="color:var(--sec-color); font-size:1.1em; margin-right:4px;">⭐</span>` : ''}${t.title}</span>
                                ${t.originalDate ? `<br><span style="font-size: 0.75rem; color: var(--text-muted); font-style: italic;">Moved from: ${t.originalDate}</span>` : ''}
                            </div>
                            <div class="task-action-btns" style="display:flex; align-items:center; gap:8px;">
                                ${(!isDone && !subT && currentUser) ? `<button class="btn-progress" onclick="toggleProgressMain(event, ${t.id})">${t.inProgress?'⚡':'▶'}</button>` : ''}
                                ${!subT ? `<button class="btn action-toggle-btn" style="background:${t.completed?'var(--sec-color)':'transparent'}; color:${t.completed?'#fff':'var(--text-muted)'}; border: 1.5px solid ${t.completed?sec.color:'var(--border-light)'}; display:${!currentUser?'none':'flex'}" onclick="event.stopPropagation(); toggleMain(${t.id})">✔</button>` : `<b style="color:${sec.color}; font-size: 1.1rem;">${per}%</b>`}
                            </div>
                        </div>
                        <div class="controls admin-only" style="display:${!currentUser?'none':'flex'}" onclick="event.stopPropagation()">
                            <button class="icon-btn" title="Toggle Important" onclick="toggleImportant(event, ${t.id})">${t.isImportant ? '⭐' : '☆'}</button>
                            <button class="icon-btn" onclick="togglePrivacy(event, ${t.id})">${t.isPrivate ? '🔓' : '🔒'}</button>
                            <button class="icon-btn" onclick="moveItem('task', ${t.id}, -1)">▲</button>
                            <button class="icon-btn" onclick="moveItem('task', ${t.id}, 1)">▼</button>
                            <button class="icon-btn" onclick="openEdit('main', ${t.id})">✏️</button>
                            <button class="icon-btn" style="color:#ef4444; border-color:rgba(239,68,68,0.3);" onclick="deleteT(${t.id})">🗑️</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
                
                const catPer = total > 0 ? Math.round((earned/total)*100) : 0;
                const bar = document.getElementById(sec.idPrefix + 'Bar');
                bar.style.width = catPer + '%';
                bar.style.backgroundColor = sec.color;
                bar.style.boxShadow = `0 0 10px ${sec.color}`;
                document.getElementById(sec.idPrefix + 'Per').innerText = catPer + '%';
            });
            updateHistoryUI();
        };

        window.openSubPopup = (id) => {
            currentOpenTaskId = id; renderSub();
            const modal = document.getElementById('subtaskModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        };

        window.renderSub = () => {
            const t = tasks.find(x => x.id === currentOpenTaskId);
            if(!t) return;
            const sortedSubs = [...t.subtasks].sort((a, b) => {
                const getSubPriority = (s) => {
                    if (s.done) return 2; if (s.inProgress) return 0; return 1;
                };
                return getSubPriority(a) - getSubPriority(b);
            });
            let visibleSubs = sortedSubs.filter(s => currentUser ? true : !s.isPrivate);
            
            document.getElementById('mTitle').innerText = t.title;
            document.getElementById('mSubList').innerHTML = visibleSubs.map(s => `
                <div class="sub-item ${s.inProgress ? 'in-progress-sub' : ''}" style="${s.done ? 'opacity:0.6; border-color: transparent;' : ''}">
                    <div class="custom-checkbox" style="display:${!currentUser?'none':'block'}" onclick="toggleSub(${s.id})">
                        <input type="checkbox" ${s.done?'checked':''}>
                        <span class="checkmark"></span>
                    </div>
                    <div style="flex:1; margin-left:${currentUser?'15px':'0'};">
                        ${s.inProgress ? '<span class="progress-badge" style="background:#6366f1; font-size:0.65rem;">In Progress</span><br>' : ''}
                        <span class="task-text" style="${s.done?'text-decoration:line-through; color: var(--text-muted);':''}">${s.isPrivate ? '🔒 ' : ''}${s.text}</span>
                    </div>
                    <div class="controls admin-only" style="display:${!currentUser?'none':'flex'}; gap:6px;">
                        ${!s.done ? `<button class="icon-btn" onclick="toggleProgressSub(${s.id})">${s.inProgress?'⚡':'▶'}</button>` : ''}
                        <button class="icon-btn" onclick="toggleSubPrivacy(${s.id})">${s.isPrivate ? '🔓' : '🔒'}</button>                        
                        <button class="icon-btn" onclick="moveItem('sub', ${s.id}, -1)">▲</button>
                        <button class="icon-btn" onclick="moveItem('sub', ${s.id}, 1)">▼</button>
                        <button class="icon-btn" onclick="openEdit('sub', ${t.id}, ${s.id})">✏️</button>
                        <button class="icon-btn" style="color:#ef4444;" onclick="deleteS(${s.id})">✖</button>
                    </div>
                </div>
            `).join('') || '<div style="text-align:center; padding: 20px; color:var(--text-muted); font-weight:300;">No sub-steps added yet.</div>';
        };

        window.openEdit = (type, id, sid=null) => {
            if(!currentUser) return;
            currentEditData = {type, id, sid};
            const t = tasks.find(x => x.id === id);
            document.getElementById('editField').value = type==='main' ? t.title : t.subtasks.find(x => x.id === sid).text;
            const modal = document.getElementById('editModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        };

        function isCatDone(cat, date) {
            const list = tasks.filter(t => t.date === date && t.category === cat);
            return list.length > 0 && list.every(t => t.subtasks.length > 0 ? t.subtasks.every(s => s.done) : t.completed);
        }

        function updateHistoryUI() {
            const uniqueDates = [...new Set(tasks.map(t => t.date))].sort();
            const container = document.getElementById('dateHistory');
            
            if (currentDateStr === 'Everyday' && !uniqueDates.includes('Everyday')) {
                uniqueDates.unshift('Everyday');
            }

            container.innerHTML = uniqueDates.map(d => {
                if (!currentUser && d === 'Everyday') { return ''; }
                const label = d === 'Everyday' ? 'General Tasks' : d;
                return `<button class="pill ${d === currentDateStr ? 'active' : ''}" onclick="setDate('${d}')">${label}</button>`;
            }).join('');
        }

        window.setDate = (d) => { 
            currentDateStr = d; 
            const dateInput = document.getElementById('dateFilter');
            if (d !== 'Everyday') {
                dateInput.value = d;
            } else {
                dateInput.value = ''; 
            }
            renderApp(); 
        };

        window.changeDateFromPicker = () => {
            const val = document.getElementById('dateFilter').value;
            if (val) {
                currentDateStr = val;
            } else {
                currentDateStr = 'Everyday';
            }
            renderApp();
        };

        window.closeModal = () => { 
            const modal = document.getElementById('subtaskModal');
            modal.classList.remove('show');
            setTimeout(() => { modal.style.display = 'none'; currentOpenTaskId = null; }, 300);
        };
        
        window.closeEdit = () => { 
            const modal = document.getElementById('editModal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        };
        
        window.closeCongrats = () => { 
            const modal = document.getElementById('congratsModal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        };
        
        window.openLogin = async () => { 
            const sEmail = localStorage.getItem('savedEmail');
            const sPass = localStorage.getItem('savedPass');
            if(sEmail && sPass) {
                try {
                    await setPersistence(auth, inMemoryPersistence);
                    await signInWithEmailAndPassword(auth, sEmail, sPass);
                    return; 
                } catch (e) {
                    document.getElementById('emailInput').value = sEmail;
                    document.getElementById('passInput').value = sPass;
                }
            }
            const modal = document.getElementById('loginOverlay');
            modal.style.display = 'flex'; 
            setTimeout(() => modal.classList.add('show'), 10);
        };
        
        window.closeLogin = () => { 
            const modal = document.getElementById('loginOverlay');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        };

        function showCongrats(cat) {
            confetti({particleCount: 250, spread: 100, origin: {y: 0.6}, colors: ['#6366f1', '#10b981', '#f59e0b', '#8b5cf6']});
            const sound = document.getElementById('successSound');
            sound.currentTime = 0; sound.play().catch(e => console.log("Sound muted"));
            document.getElementById('congratsTitle').innerText = "Mission Accomplished!";
            const modal = document.getElementById('congratsModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        window.downloadPDF = () => {
            const dayTasks = tasks.filter(t => currentUser ? t.date === currentDateStr : (t.date === currentDateStr && !t.isPrivate));
            if (dayTasks.length === 0) return alert("No tasks found for this date!");

            const displayDate = currentDateStr === 'Everyday' ? 'Everyday Tasks (General Tasks)' : currentDateStr;

            const element = document.createElement('div');
            element.style.padding = "40px";
            element.style.fontFamily = "'Hind Siliguri', sans-serif";
            element.style.color = "#0f172a";
            element.style.background = "#ffffff";

            let content = `
                <div style="text-align:center; margin-bottom:30px;">
                    <h1 style="margin:0; color:#0f172a; font-size:26px; font-weight:700;">DAILY FOCUS LOG</h1>
                    <p style="color:#64748b; font-size:15px; margin-top:5px;">Timeline: <b>${displayDate}</b></p>
                    <div style="height:3px; width:50px; background:#6366f1; margin:15px auto; border-radius:5px;"></div>
                </div>
            `;

            ['প্লানওয়াইজ পড়া', 'CT এর পড়া', 'MT এর পড়া', 'কলেজের পড়া', 'কোচিং এর পড়া', 'Others Tasks'].forEach(cat => {
                const catTasks = dayTasks.filter(t => t.category === cat);
                if(catTasks.length > 0) {
                    content += `<h3 style="color:#334155; border-bottom:1px solid #e2e8f0; padding-bottom:8px; margin-top:25px; font-weight:600;">${cat}</h3>`;
                    catTasks.forEach(t => {
                        const visibleSubs = t.subtasks.filter(s => currentUser ? true : !s.isPrivate);
                        const isDone = visibleSubs.length > 0 ? visibleSubs.every(s => s.done) : t.completed;
                        
                        content += `
                            <div style="margin-bottom:12px; padding:10px 15px; border-radius:8px; border-left:4px solid ${isDone?'#10b981':'#cbd5e1'}; background:#f8fafc;">
                                <div style="font-weight:400; font-size:14px; color:#1e293b;">
                                    ${t.isPrivate ? '🔒 ' : ''}${t.isImportant ? '⭐ ' : ''}${t.title}
                                </div>
                                ${visibleSubs.length > 0 ? `<ul style="margin:6px 0 0 20px; padding:0; color:#475569; font-size:13px;">` + visibleSubs.map(s => `<li style="margin-bottom:3px; font-weight:300;">${s.done?'✓':'○'} ${s.isPrivate ? '[Private] ' : ''}${s.text}</li>`).join('') + `</ul>` : ''}
                            </div>
                        `;
                    });
                }
            });

            element.innerHTML = content; document.body.appendChild(element);
            const opt = {
                margin: 0.5, filename: `Focus_Log_${currentDateStr}.pdf`,
                image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save().then(() => document.body.removeChild(element));
        };
    </script>

    <style>
        :root {
            --font-main: 'Hind Siliguri', sans-serif;
            --font-head: 'Outfit', 'Hind Siliguri', sans-serif;
            
            --color-secA: #ff4b4b; 
            --color-secB: #7c3aed; 
            --color-secC: #10b981; 
            --color-secD: #eab308; 
            --color-secF: #0ea5e9; 
            --color-secE: #ec4899; 
            
            --radius-lg: 24px;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --transition-bounce: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- Light Theme --- */
        :root, [data-theme="light"] {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --bg-card-hover: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-light: rgba(0, 0, 0, 0.08);
            --border-strong: rgba(0, 0, 0, 0.15);
            --task-bg: #ffffff;
            --task-border: rgba(0, 0, 0, 0.06);
            --task-hover: #f8fafc;
            --input-bg: #f8fafc;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow: 0 10px 30px rgba(0,0,0,0.06);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.1);
            --shadow-popup: 0 25px 50px rgba(0, 0, 0, 0.15);
            --overlay-bg: rgba(15, 23, 42, 0.4);
            --subitem-bg: #f8fafc;
            --popup-bg: rgba(255, 255, 255, 0.95);
        }

        /* --- Dark Theme --- */
        [data-theme="dark"] {
            --bg-body: #0b1121;
            --bg-card: #151e32;
            --bg-card-hover: #1a243b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-light: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.15);
            --task-bg: #151e32;
            --task-border: rgba(255, 255, 255, 0.05);
            --task-hover: #1e293b;
            --input-bg: #0f172a;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.4);
            --shadow-popup: 0 25px 50px rgba(0, 0, 0, 0.6);
            --overlay-bg: rgba(0, 0, 0, 0.7);
            --subitem-bg: rgba(255, 255, 255, 0.02);
            --popup-bg: rgba(21, 30, 50, 0.95);
        }

        body { 
            font-family: var(--font-main);
            background-color: var(--bg-body);
            margin: 0; 
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 20px; opacity: 0.5;}
        ::-webkit-scrollbar-thumb:hover { background: var(--color-secB); }

        /* Floating Actions Container */
        .fab-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
            z-index: 999;
        }

        .fab-btn {
            display: none !important; 
            align-items: center; justify-content: center;
            cursor: pointer; border: none; color: white;
            border-radius: 50%; width: 56px; height: 56px;
            font-size: 1.4rem; box-shadow: var(--shadow);
            transition: var(--transition-bounce);
            backdrop-filter: blur(10px);
        }
        .is-logged-in .fab-btn { display: flex !important; }
        .fab-btn:hover { transform: scale(1.1) translateY(-5px); }
        
        #moveTodayBtn { background: linear-gradient(135deg, var(--color-secB), #a78bfa) !important; }
        #moveToGeneralBtn { background: linear-gradient(135deg, var(--color-secD), #fde047) !important; color: #713f12; }
        #moveAllTodayBtn { background: linear-gradient(135deg, #3b82f6, #93c5fd) !important; width: 48px; height: 48px; font-size: 1.1rem; }
        #moveAllGeneralBtn { background: linear-gradient(135deg, #f97316, #fdba74) !important; width: 48px; height: 48px; font-size: 1.1rem;}

        /* Modals & Overlays */
        .modal-overlay { 
            position: fixed; inset: 0; background: var(--overlay-bg); 
            display: none; justify-content: center; align-items: center; 
            z-index: 6000; backdrop-filter: blur(8px); 
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.show { opacity: 1; }
        #sectionOverlay { z-index: 5000; }

        .login-card, .modal-card { 
            background: var(--popup-bg); padding: clamp(25px, 5vw, 45px); 
            border-radius: var(--radius-lg); text-align: center; 
            width: 90%; max-width: 420px; box-shadow: var(--shadow-popup); 
            border: 1px solid var(--border-light); color: var(--text-main);
            transform: scale(0.95) translateY(20px); transition: var(--transition-bounce);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .modal-overlay.show .login-card, .modal-overlay.show .modal-card {
            transform: scale(1) translateY(0);
        }

        .login-card h2, .modal-card h3 { 
            margin-top: 0; font-family: var(--font-head); 
            font-size: clamp(1.6rem, 5vw, 2.2rem); 
            font-weight: 700; margin-bottom: 30px; letter-spacing: -0.5px;
        }

        /* Inputs & Buttons */
        .pass-container { position: relative; width: 100%; margin-bottom: 25px; }
        
        input[type="text"], input[type="password"], input[type="email"], input[type="date"] { 
            width: 100%; box-sizing: border-box;
            padding: 14px 18px; background: var(--input-bg); color: var(--text-main);
            border: 1px solid var(--border-light); border-radius: var(--radius-sm); 
            outline: none; font-family: var(--font-main); font-size: 16px; 
            transition: var(--transition); box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        input:focus { 
            border-color: var(--color-secB); 
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15); 
            background: var(--bg-card);
        }
        
        .toggle-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.2rem; }

        .btn { 
            border: none; padding: 12px 24px; border-radius: var(--radius-sm); 
            cursor: pointer; font-weight: 600; font-family: var(--font-main); 
            transition: var(--transition-bounce); font-size: 15px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-sm); }
        .btn:active { transform: translateY(0); }
        
        .btn-add { 
            background: var(--text-muted); color: white; display: flex; align-items: center; 
            justify-content: center; font-size: 1.5rem; width: 50px; height: 50px; padding: 0; 
            border-radius: var(--radius-sm); flex-shrink: 0;
        }

        /* Top Bar Layout */
        #app { 
            display: flex; flex-direction: column; padding: clamp(20px, 4vw, 50px); 
            max-width: 1600px; margin: 0 auto; min-height: 100vh; box-sizing: border-box;
            opacity: 0; transform: translateY(15px); transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }

        .top-container {
            display: flex; justify-content: space-between; align-items: flex-end; 
            margin-bottom: 40px; flex-wrap: wrap; gap: 25px;
        }
        
        .headline-wrapper h1 { 
            font-family: var(--font-head); font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; 
            margin: 0 0 15px 0; letter-spacing: -1px; display: flex; align-items: center; gap: 12px;
        }
        .headline-wrapper h1 span { 
            background: linear-gradient(135deg, var(--color-secB), var(--color-secF));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .history-pills { display: flex; gap: 10px; flex-wrap: wrap; }
        .pill { 
            cursor: pointer; padding: 8px 18px; border-radius: 30px; 
            font-size: 0.9rem; font-weight: 500; transition: var(--transition); 
            background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }
        .pill.active { 
            background: var(--text-main); color: var(--bg-body); 
            border-color: var(--text-main); font-weight: 600; 
            transform: translateY(-2px); box-shadow: var(--shadow);
        }
        .pill:hover:not(.active) { background: var(--bg-card-hover); color: var(--text-main); transform: translateY(-2px); }

        .controls-wrapper { 
            display: flex; align-items: center; gap: 15px; background: var(--bg-card); 
            padding: 12px 25px; border-radius: 100px; border: 1px solid var(--border-light); 
            box-shadow: var(--shadow-sm); flex-wrap: wrap; backdrop-filter: blur(10px);
        }

        /* Dashboard Grid & Sections */
        .dashboard-grid { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px; width: 100%; padding-bottom: 40px;
        }
        
        .col-section { 
            background: var(--bg-card); border-radius: var(--radius-lg); 
            border: 1px solid var(--border-light); display: flex; flex-direction: column; 
            transition: var(--transition-bounce); cursor: pointer; overflow: hidden; position: relative;
            box-shadow: var(--shadow-sm);
        }
        .col-section:hover:not(.popup-mode) { 
            transform: translateY(-8px); box-shadow: var(--shadow-hover); border-color: var(--border-strong);
        }

        /* Gradient Borders on Top */
        #col-secA { border-top: 5px solid var(--color-secA); }
        #col-secB { border-top: 5px solid var(--color-secB); }
        #col-secC { border-top: 5px solid var(--color-secC); }
        #col-secE { border-top: 5px solid var(--color-secE); }
        #col-secF { border-top: 5px solid var(--color-secF); }
        #col-secD { border-top: 5px solid var(--color-secD); }

        .col-section:not(.popup-mode) .section-content { display: none; }

        /* Popup Mode Styles */
        .col-section.popup-mode {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -45%) scale(0.95);
            width: 90vw; max-width: 700px; height: 85vh; max-height: 850px;
            z-index: 5001; background: var(--popup-bg);
            box-shadow: var(--shadow-popup); margin: 0; cursor: default;
            border-radius: var(--radius-lg); border: 1px solid var(--border-strong);
            opacity: 0; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        }
        .col-section.popup-mode.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        .close-popup-btn { 
            display: none; background: rgba(255,0,0,0.1); border: none; width: 36px; height: 36px;
            border-radius: 50%; color: #ef4444; cursor: pointer; transition: var(--transition); 
            font-size: 1.2rem; align-items: center; justify-content: center;
        }
        .close-popup-btn:hover { background: #ef4444; color: white; transform: rotate(90deg); }
        .col-section.popup-mode .close-popup-btn { display: flex; margin-left: auto; }
        
        .sec-header { padding: 25px 30px; flex-shrink: 0; display: flex; flex-direction: column; }
        .sec-title { 
            font-family: var(--font-head); font-size: 1.4rem; font-weight: 700; 
            display: flex; align-items: center; gap: 12px; color: var(--text-main); 
        }
        .col-section.popup-mode .sec-title { font-size: 1.8rem; justify-content: space-between; }
        
        .sec-stats { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; }
        .task-count-badge {
            display: inline-flex; align-items: center; gap: 8px; background: var(--input-bg);
            padding: 6px 14px; border-radius: 20px; font-size: 0.9rem; font-weight: 600;
            color: var(--text-muted); border: 1px solid var(--border-light);
        }

        .sec-bar-outer { width: 100%; height: 8px; background: var(--input-bg); border-radius: 10px; overflow: hidden; margin-top: 15px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        .sec-bar-inner { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.1, 0.7, 0.1, 1); border-radius: 10px; }

        .section-content { padding: 0 30px 30px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; }
        .add-zone { display: flex; gap: 12px; margin-bottom: 25px; }

        /* Task Items */
        .task-item { 
            background: var(--task-bg); border: 1px solid var(--task-border); 
            border-radius: var(--radius); margin-bottom: 15px; padding: 18px 20px; 
            cursor: pointer; transition: var(--transition); display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .task-item:hover { transform: translateX(5px); border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
        
        .task-item.completed { 
            background: transparent; border: 1px dashed var(--border-strong); opacity: 0.65; 
            box-shadow: none; transform: none;
        }
        .task-main { display: flex; justify-content: space-between; align-items: center; }
        .task-text { font-size: 1.05rem; font-weight: 300; line-height: 1.4; }
        
        .task-item.in-progress { border-left: 5px solid var(--sec-color) !important; background: var(--task-hover); }

            border-left: 5px solid var(--sec-color) !important;
            background-color: color-mix(in srgb, var(--sec-color) 8%, transparent);
        }

        .progress-badge {
            display: inline-block; font-size: 0.75rem; color: #fff;
            font-weight: 700; padding: 4px 10px; border-radius: 6px;
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-progress {
            background: var(--input-bg); border: 1px solid var(--border-light); color: var(--text-main);
            padding: 8px 12px; border-radius: var(--radius-sm); cursor: pointer;
            font-size: 0.9rem; transition: var(--transition); opacity: 0; display: none; font-weight: 600;
        }
        .is-logged-in .btn-progress { display: flex; align-items: center; justify-content: center; }
        .btn-progress:hover { background: var(--text-main); color: var(--bg-body); }
        @media (min-width: 769px) { .task-item:hover .btn-progress { opacity: 1; } }

        /* Checkbox Replacement for Main tasks */
        .action-toggle-btn { 
            width: 40px; height: 40px; display: flex; align-items: center; 
            justify-content: center; border-radius: 50%; padding: 0; font-size: 1.1rem; 
            transition: var(--transition-bounce);
        }
        .action-toggle-btn:hover { transform: scale(1.1); }

        /* Controls / Icons */
        .controls { display: flex; gap: 8px; flex-wrap: wrap; opacity: 0; transition: var(--transition); padding-top: 8px; border-top: 1px solid var(--border-light); }
        .is-logged-in .task-item:hover .controls, .is-logged-in .sub-item:hover .controls { opacity: 1; }
        
        .icon-btn { 
            background: var(--input-bg); color: var(--text-muted); width: 34px; height: 34px; 
            display: flex; align-items: center; justify-content: center; border-radius: 8px; 
            border: 1px solid var(--border-light); cursor: pointer; font-size: 0.9rem; transition: var(--transition);
        }
        .icon-btn:hover { background: var(--text-main); color: var(--bg-body); border-color: var(--text-main); transform: translateY(-2px); }

        /* Subtasks */
        .sub-item { 
            display: flex; align-items: center; gap: 15px; background: var(--subitem-bg); 
            padding: 15px; border-radius: var(--radius-sm); margin-bottom: 10px; 
            border: 1px solid var(--border-light); transition: var(--transition); 
        }
        .sub-item:hover { border-color: var(--border-strong); background: var(--task-hover); }
        .in-progress-sub { border-left: 4px solid #6366f1; }

        /* Custom Checkbox for Subtasks */
        .custom-checkbox {
            position: relative; width: 22px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .custom-checkbox input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark {
            position: absolute; top: 0; left: 0; height: 22px; width: 22px; 
            background-color: transparent; border: 2px solid var(--border-strong); 
            border-radius: 6px; transition: var(--transition);
        }
        .custom-checkbox:hover input ~ .checkmark { border-color: var(--color-secC); }
        .custom-checkbox input:checked ~ .checkmark { background-color: var(--color-secC); border-color: var(--color-secC); }
        .checkmark:after { content: ""; position: absolute; display: none; left: 7px; top: 3px; width: 5px; height: 10px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }
        .custom-checkbox input:checked ~ .checkmark:after { display: block; }

        /* Responsive Design */
        @media (max-width: 768px) {
            #app { padding: 15px; }
            .top-container { flex-direction: column; align-items: flex-start; gap: 15px; margin-bottom: 25px; }
            .controls-wrapper { width: 100%; justify-content: space-between; border-radius: var(--radius); padding: 12px; gap: 10px; }

            .col-section.popup-mode { width: 95vw; height: 90vh; border-radius: var(--radius); }
            .sec-header { padding: 20px; }
            .section-content { padding: 0 20px 20px; }

            .is-logged-in .btn-progress { opacity: 1 !important; } 
            body:not(.is-logged-in) .controls, body:not(.is-logged-in) .btn-progress { display: none !important; }
            
            .fab-container { left: 20px; bottom: 20px; flex-direction: row; flex-wrap: wrap; width: calc(100% - 40px); justify-content: flex-start;}
            .fab-btn { width: 45px; height: 45px; font-size: 1.2rem; }
        }
    </style>
</head>

<script>
    const themeBtn = document.getElementById('themeToggleBtn');
    
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('userTheme', theme);
        themeBtn.innerText = theme === 'dark' ? '☀️' : '🌙';
    }

    function initTheme() {
        const storedTheme = localStorage.getItem('userTheme');
        if(storedTheme) {
            applyTheme(storedTheme);
        } else {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(prefersDark ? 'dark' : 'light');
        }
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
        if(!localStorage.getItem('userTheme')) {
            applyTheme(event.matches ? 'dark' : 'light');
        }
    });

    window.toggleTheme = () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    };

    initTheme();

    // Security (Optional: You can remove this if you want to inspect your code later)
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || 
            (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || 
            (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
            return false;
        }
    };
</script>

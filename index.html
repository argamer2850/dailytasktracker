<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার রুটিন ও কাজ</title>
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --danger: #EF4444;
            --success: #10B981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .input-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="date"], select {
            padding: 12px 15px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            flex: 1;
            min-width: 200px;
        }

        input[type="text"]:focus, input[type="date"]:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button.add-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }

        button.add-btn:hover {
            background-color: var(--primary-hover);
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .tasks-grid {
                grid-template-columns: 1fr;
            }
        }

        .task-column {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .task-column h2 {
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bg-color);
            color: var(--primary-color);
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-color);
            border-radius: 8px;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }

        .task-item:hover {
            transform: translateX(5px);
        }

        .task-content {
            flex: 1;
        }

        .task-name {
            font-weight: 600;
            margin-bottom: 3px;
        }

        .task-date {
            font-size: 12px;
            color: var(--text-muted);
            background: #E5E7EB;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
        }

        .task-item.completed .task-name {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
            transition: transform 0.2s;
        }

        .actions button:hover {
            transform: scale(1.2);
        }

        .btn-check { color: var(--success); }
        .btn-delete { color: var(--danger); }

        .empty-msg {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            font-style: italic;
            margin-top: 20px;
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🗓️ আমার দিনলিপি</h1>
        <p>প্রতিদিনের পড়া এবং কাজের হিসাব রাখুন সহজেই</p>
    </header>

    <div class="input-section">
        <div class="form-group">
            <input type="text" id="taskInput" placeholder="কী কাজ করতে হবে? (যেমন: ফিজিক্স চ্যাপ্টার ৩ পড়া)">
        </div>
        <div class="form-group">
            <select id="taskType" onchange="toggleDateInput()">
                <option value="dated">তারিখ অনুযায়ী কাজ</option>
                <option value="general">সাধারণ কাজ (যেকোনো সময়)</option>
            </select>
            <input type="date" id="taskDate">
        </div>
        <button class="add-btn" onclick="addTask()">যোগ করুন</button>
    </div>

    <div class="tasks-grid">
        <div class="task-column">
            <h2>📅 নির্দিষ্ট তারিখের কাজ</h2>
            <div id="datedTaskList"></div>
        </div>

        <div class="task-column">
            <h2>📌 সাধারণ কাজ</h2>
            <div id="generalTaskList"></div>
        </div>
    </div>
</div>

<script>
    // লোকাল স্টোরেজ থেকে ডেটা নিয়ে আসা
    let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];

    // তারিখের ইনপুট ফিল্ড দেখানো বা লুকানো
    function toggleDateInput() {
        const type = document.getElementById('taskType').value;
        const dateInput = document.getElementById('taskDate');
        if (type === 'general') {
            dateInput.style.display = 'none';
        } else {
            dateInput.style.display = 'block';
        }
    }

    // নতুন কাজ যোগ করা
    function addTask() {
        const name = document.getElementById('taskInput').value.trim();
        const type = document.getElementById('taskType').value;
        const date = document.getElementById('taskDate').value;

        if (name === '') {
            alert('অনুগ্রহ করে কাজের নাম লিখুন!');
            return;
        }

        if (type === 'dated' && date === '') {
            alert('অনুগ্রহ করে তারিখ নির্বাচন করুন!');
            return;
        }

        const newTask = {
            id: Date.now(),
            name: name,
            type: type,
            date: date,
            completed: false
        };

        tasks.push(newTask);
        saveAndRender();
        
        // ইনপুট ফিল্ড খালি করা
        document.getElementById('taskInput').value = '';
        document.getElementById('taskDate').value = '';
    }

    // কাজ কমপ্লিট করা
    function toggleComplete(id) {
        tasks = tasks.map(task => {
            if (task.id === id) {
                return { ...task, completed: !task.completed };
            }
            return task;
        });
        saveAndRender();
    }

    // কাজ ডিলিট করা
    function deleteTask(id) {
        if(confirm('আপনি কি নিশ্চিত যে এই কাজটি মুছে ফেলতে চান?')) {
            tasks = tasks.filter(task => task.id !== id);
            saveAndRender();
        }
    }

    // ডেটা সেভ করা এবং স্ক্রিনে দেখানো
    function saveAndRender() {
        localStorage.setItem('myTasks', JSON.stringify(tasks));
        renderTasks();
    }

    // স্ক্রিনে কাজগুলো সাজিয়ে দেখানো
    function renderTasks() {
        const datedList = document.getElementById('datedTaskList');
        const generalList = document.getElementById('generalTaskList');
        
        datedList.innerHTML = '';
        generalList.innerHTML = '';

        const datedTasks = tasks.filter(task => task.type === 'dated');
        const generalTasks = tasks.filter(task => task.type === 'general');

        // তারিখ অনুযায়ী কাজ দেখানো
        if (datedTasks.length === 0) {
            datedList.innerHTML = '<p class="empty-msg">কোনো কাজ নেই!</p>';
        } else {
            datedTasks.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(task => {
                datedList.appendChild(createTaskElement(task));
            });
        }

        // সাধারণ কাজ দেখানো
        if (generalTasks.length === 0) {
            generalList.innerHTML = '<p class="empty-msg">কোনো কাজ নেই!</p>';
        } else {
            generalTasks.forEach(task => {
                generalList.appendChild(createTaskElement(task));
            });
        }
    }

    // HTML এলিমেন্ট তৈরি করা
    function createTaskElement(task) {
        const div = document.createElement('div');
        div.className = `task-item ${task.completed ? 'completed' : ''}`;
        
        let dateHtml = '';
        if (task.type === 'dated') {
            // তারিখ সুন্দরভাবে ফরম্যাট করা
            const dateObj = new Date(task.date);
            const formattedDate = dateObj.toLocaleDateString('bn-BD', { day: 'numeric', month: 'long', year: 'numeric' });
            dateHtml = `<div class="task-date">⏳ ${formattedDate}</div>`;
        }

        div.innerHTML = `
            <div class="task-content">
                <div class="task-name">${task.name}</div>
                ${dateHtml}
            </div>
            <div class="actions">
                <button class="btn-check" onclick="toggleComplete(${task.id})" title="সম্পন্ন হয়েছে">✔️</button>
                <button class="btn-delete" onclick="deleteTask(${task.id})" title="মুছে ফেলুন">🗑️</button>
            </div>
        `;
        return div;
    }

    // প্রথমবার ওয়েবসাইট লোড হওয়ার সময়
    toggleDateInput();
    renderTasks();

</script>
</body>
</html>
